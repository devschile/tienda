[build]
  publish = "dist"
  # Instala deps de la raíz Y de las Netlify Functions antes del build
  command = "npm install && npm install --prefix netlify/functions && npx vite build"

[functions]
  directory = "netlify/functions"

# Headers para todos los recursos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Caché larga para assets con hash (JS/CSS/imágenes del bundle de Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Caché corta para HTML (siempre fresco)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Sin caché para favicons y manifest (pueden cambiar con nuevas versiones)
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Admin API — enruta /admin-api/* a la función router CRUD
[[redirects]]
  from = "/admin-api/*"
  to   = "/.netlify/functions/admin-api/:splat"
  status = 200
